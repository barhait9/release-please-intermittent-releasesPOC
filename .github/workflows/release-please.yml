name: Release Please

on:
  push:
    branches:
      - main
      - beta

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please (main)
        if: >
          github.ref == 'refs/heads/main' &&
          !startsWith(github.event.head_commit.message, 'chore: promote beta releases to stable')
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Release Please (beta)
        if: github.ref == 'refs/heads/beta'
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config-beta.json
          manifest-file: .release-please-manifest-beta.json
          target-branch: beta
